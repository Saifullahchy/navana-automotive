<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Navana Automotive Solution — Certified JDM Vehicles</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&family=Manrope:wght@400;500;600;700;800&family=Geist:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    @page {
      size: portrait;
      margin: 1cm;
    }

    @media print {
      * {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }

      body {
        margin: 0;
        padding: 0;
      }

      /* Hide interactive elements */
      .header,
      .footer,
      .btn,
      button,
      .watch-pill,
      .scroll-hint,
      .scroll-line,
      .tweaks-panel,
      .twk-panel {
        display: none !important;
      }

      /* Remove animations */
      * {
        animation: none !important;
        transition: none !important;
      }

      /* Hero adjustments */
      .hero-cine {
        min-height: auto;
        page-break-after: page;
        break-after: page;
      }

      .hero-cine .bg {
        transform: scale(1) !important;
        animation: none !important;
      }

      .hero-cine .inner {
        min-height: auto;
        padding: 40px;
      }

      /* Section breaks */
      .section {
        page-break-inside: avoid;
        break-inside: avoid;
      }

      .brand-strip {
        page-break-before: page;
        break-before: page;
      }

      /* Featured grid - keep together */
      .featured-grid {
        page-break-inside: avoid;
        break-inside: avoid;
      }

      /* Cards */
      .card {
        page-break-inside: avoid;
        break-inside: avoid;
        box-shadow: 0 2px 8px rgba(0,0,0,.1) !important;
      }

      /* Search card */
      .hero-search-wrap {
        margin-top: 40px;
        margin-bottom: 40px;
        page-break-inside: avoid;
        break-inside: avoid;
      }

      /* Value grid */
      .value-grid,
      .showroom-grid,
      .category-grid {
        page-break-inside: avoid;
        break-inside: avoid;
      }

      /* CTA strip */
      .cta-strip {
        page-break-before: page;
        break-before: page;
      }

      /* Product page */
      .products-layout {
        display: block !important;
      }

      .filter-side {
        position: static !important;
        float: left;
        width: 280px;
        margin-right: 32px;
      }

      .products-grid {
        clear: both;
      }

      /* Detail page gallery */
      .gallery-thumbs,
      .img-nav {
        display: none !important;
      }

      .detail-grid {
        page-break-inside: avoid;
        break-inside: avoid;
      }

      .detail-tabs button {
        display: none !important;
      }

      .detail-tabs button.on {
        display: inline-block !important;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="home.jsx"></script>
  <script type="text/babel" src="products.jsx"></script>
  <script type="text/babel" src="vehicle.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>

  <script type="text/babel">
    // Auto-print after everything loads
    (async () => {
      // Wait for fonts
      await document.fonts.ready;
      
      // Wait for React to render
      await new Promise(resolve => setTimeout(resolve, 1500));
      
      // Trigger print dialog
      window.print();
    })();
  </script>
</body>
</html>
